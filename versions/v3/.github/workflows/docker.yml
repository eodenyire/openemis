# =============================================================================
# openEMIS – Docker Build & Integration Tests
# =============================================================================
# 1. Builds the openEMIS Docker image from the repository Dockerfile.
# 2. Starts the full stack (Postgres + Odoo) via Docker Compose.
# 3. Installs the openEMIS modules and waits for the system to become ready.
# 4. Runs the API end-to-end test suite (scripts/api_test.sh).
# 5. Captures snapshots of each module endpoint as test evidence.
# 6. On the main branch, optionally pushes the image to GHCR.
# =============================================================================
name: Docker – Build & Integration Tests

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main", "master", "develop"]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/openemis
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ---------------------------------------------------------------------------
  # Build the Docker image
  # ---------------------------------------------------------------------------
  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') || github.ref == format('refs/heads/{0}', 'master') }}

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: openemis:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/openemis.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: openemis-docker-image
          path: /tmp/openemis.tar
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Integration tests against a live Docker Compose stack
  # ---------------------------------------------------------------------------
  integration-tests:
    name: Integration & API Tests
    runs-on: ubuntu-latest
    needs: docker-build
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: openemis-docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load -i /tmp/openemis.tar

      - name: Create test database and start stack
        run: |
          # Start PostgreSQL first
          docker compose up -d db
          # Wait for db to be healthy
          for i in $(seq 1 30); do
            if docker compose ps db | grep -q "healthy"; then
              echo "PostgreSQL is healthy"
              break
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 5
          done

      - name: Install openEMIS modules and seed data
        run: |
          # Initialise the Odoo database with openEMIS modules + demo data
          docker run --rm \
            --network openemis_default \
            -v "${{ github.workspace }}:/mnt/extra-addons" \
            openemis:latest \
            odoo \
              --db_host=db \
              --db_port=5432 \
              --db_user=odoo \
              --db_password=odoo \
              --database=openemis \
              --addons-path=/usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons \
              --init=openemis_erp \
              --load-language=en_US \
              --without-demo=False \
              --stop-after-init \
              --log-level=info \
            2>&1 | tail -20

      - name: Start Odoo web server
        run: |
          docker compose up -d odoo
          echo "Waiting for Odoo to become ready..."
          for i in $(seq 1 60); do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8069/web/health 2>/dev/null || echo "000")
            if [ "$HTTP" = "200" ]; then
              echo "Odoo is ready (HTTP $HTTP)"
              break
            fi
            echo "  Attempt $i/60 – HTTP $HTTP – sleeping 10s..."
            sleep 10
          done
          # Final check
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8069/web/health 2>/dev/null || echo "000")
          if [ "$HTTP" != "200" ]; then
            echo "::error::Odoo did not become ready in time (last HTTP=$HTTP)"
            docker compose logs odoo | tail -50
            exit 1
          fi

      - name: Run API end-to-end tests
        run: bash scripts/api_test.sh localhost 8069 openemis admin admin

      - name: Capture module snapshots
        run: bash scripts/snapshot_test.sh localhost 8069 openemis admin admin

      - name: Upload test snapshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openemis-snapshots-${{ github.run_number }}
          path: /tmp/openemis_snapshots/
          if-no-files-found: ignore

      - name: Tear down stack
        if: always()
        run: docker compose down -v --remove-orphans

  # ---------------------------------------------------------------------------
  # Push image to GHCR (main / master branch only)
  # ---------------------------------------------------------------------------
  push-image:
    name: Push to GHCR
    runs-on: ubuntu-latest
    needs: integration-tests
    if: >
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
