services:
  db:
    image: postgres:15
    container_name: openemis_db
    environment:
      POSTGRES_DB: openemis_db
      POSTGRES_USER: openemis
      POSTGRES_PASSWORD: openemis
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openemis -d openemis_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  api:
    build: .
    container_name: openemis_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://openemis:openemis@db:5432/openemis_db
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      APP_NAME: openEMIS
      APP_VERSION: "1.0.0"
      DEBUG: "True"
      CORS_ORIGINS: '["http://localhost:8000","http://127.0.0.1:8000"]'
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
