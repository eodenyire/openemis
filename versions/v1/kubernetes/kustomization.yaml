apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: openemis

resources:
  - namespace.yaml
  - postgres.yaml
  - openemis.yaml

# Override the openEMIS container image tag here (or via --set-image at deploy time)
# Example: kubectl apply -k kubernetes/ --set-image openemis=ghcr.io/eodenyire/openemis:v1.0.0
images:
  - name: openemis
    newName: ghcr.io/eodenyire/openemis
    newTag: latest
