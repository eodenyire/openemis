---
# Secret holding the app's SECRET_KEY
# TODO: replace the value with a strong random secret before deploying to production.
apiVersion: v1
kind: Secret
metadata:
  name: openemis-secret
  namespace: openemis
  labels:
    app: openemis
    app.kubernetes.io/part-of: openemis
type: Opaque
stringData:
  SECRET_KEY: "change-me-in-production"
---
# ConfigMap for non-sensitive runtime configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: openemis-config
  namespace: openemis
  labels:
    app: openemis
    app.kubernetes.io/part-of: openemis
data:
  APP_NAME: openEMIS
  APP_VERSION: "1.0.0"
  DEBUG: "False"
  ALGORITHM: HS256
  ACCESS_TOKEN_EXPIRE_MINUTES: "60"
  CORS_ORIGINS: '["https://openemis.example.com"]'
---
# openEMIS API Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openemis
  namespace: openemis
  labels:
    app: openemis
    app.kubernetes.io/part-of: openemis
spec:
  replicas: 2
  selector:
    matchLabels:
      app: openemis
  template:
    metadata:
      labels:
        app: openemis
    spec:
      initContainers:
        # Wait until PostgreSQL is accepting connections before starting the API
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do
                echo "Waiting for PostgreSQL..."; sleep 2;
              done
      containers:
        - name: openemis
          # Replace with a specific version tag (e.g. ghcr.io/eodenyire/openemis:v1.0.0) for production.
          image: openemis:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: openemis-secret
                  key: SECRET_KEY
          envFrom:
            - configMapRef:
                name: openemis-config
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
---
# Service – exposes openEMIS within the cluster
apiVersion: v1
kind: Service
metadata:
  name: openemis
  namespace: openemis
  labels:
    app: openemis
    app.kubernetes.io/part-of: openemis
spec:
  selector:
    app: openemis
  ports:
    - name: http
      port: 80
      targetPort: 8000
---
# Ingress – routes external HTTP traffic to openEMIS
# Requires an Ingress controller (e.g. ingress-nginx) to be installed.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openemis-ingress
  namespace: openemis
  labels:
    app: openemis
    app.kubernetes.io/part-of: openemis
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
spec:
  rules:
    - host: openemis.example.com   # TODO: replace with your actual hostname before deploying
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: openemis
                port:
                  number: 80
