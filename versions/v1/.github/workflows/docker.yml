# =============================================================================
# openEMIS – Docker Build & Push
# =============================================================================
# 1. Builds the openEMIS Docker image.
# 2. Runs a smoke test against the containerised stack.
# 3. On main/master, pushes the image to GHCR.
# =============================================================================
name: Docker – Build & Push

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main", "master", "develop"]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/openemis

jobs:
  build-and-test:
    name: Build & Smoke Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: openemis:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/openemis.tar

      - name: Load image
        run: docker load -i /tmp/openemis.tar

      - name: Start stack
        run: |
          docker compose up -d db
          for i in $(seq 1 30); do
            if docker compose ps db | grep -q "healthy"; then
              echo "PostgreSQL is healthy"; break
            fi
            echo "Waiting for PostgreSQL... ($i/30)"; sleep 3
          done
          docker run -d --name openemis_test \
            --network "$(docker compose ps -q db | xargs docker inspect --format '{{range .NetworkSettings.Networks}}{{.NetworkID}}{{end}}' | head -1)" \
            -e DATABASE_URL=postgresql://openemis:openemis@openemis_db:5432/openemis_db \
            -e SECRET_KEY=ci-test-secret \
            -e ALGORITHM=HS256 \
            -e ACCESS_TOKEN_EXPIRE_MINUTES=60 \
            -e APP_NAME=openEMIS \
            -e APP_VERSION=1.0.0 \
            -e DEBUG=True \
            -e CORS_ORIGINS='["http://localhost:8000"]' \
            -p 8000:8000 \
            openemis:latest

      - name: Wait for API
        run: |
          for i in $(seq 1 20); do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health 2>/dev/null || echo "000")
            if [ "$HTTP" = "200" ]; then echo "API is ready (HTTP $HTTP)"; break; fi
            echo "Attempt $i/20 – HTTP $HTTP – sleeping 5s..."; sleep 5
          done
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health 2>/dev/null || echo "000")
          if [ "$HTTP" != "200" ]; then
            echo "::error::API health check failed (HTTP=$HTTP)"
            docker logs openemis_test | tail -50
            exit 1
          fi

      - name: Smoke test API docs
        run: |
          curl -fs http://localhost:8000/api/docs > /dev/null && echo "API docs OK"

      - name: Tear down
        if: always()
        run: docker compose down -v --remove-orphans; docker rm -f openemis_test || true

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: openemis-docker-image
          path: /tmp/openemis.tar
          retention-days: 1

  push-image:
    name: Push to GHCR
    runs-on: ubuntu-latest
    needs: build-and-test
    if: >
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
