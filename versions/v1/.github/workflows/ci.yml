# =============================================================================
# openEMIS – Continuous Integration
# =============================================================================
# Runs on every push / pull-request:
#   1. Python linting (flake8)
#   2. FastAPI unit & integration tests against a live PostgreSQL instance
# =============================================================================
name: CI – Lint & Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    name: Flake8 Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8==7.1.1

      - name: Run flake8
        run: flake8 app/ --max-line-length=120 --exclude=__pycache__

  test:
    name: Pytest
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: openemis_db
          POSTGRES_USER: openemis
          POSTGRES_PASSWORD: openemis
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U openemis -d openemis_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: postgresql://openemis:openemis@localhost:5432/openemis_db
          SECRET_KEY: ci-test-secret-key
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: "60"
          APP_NAME: openEMIS
          APP_VERSION: "1.0.0"
          DEBUG: "True"
          CORS_ORIGINS: '["http://localhost:8000"]'
        run: pytest tests/ -v --tb=short || true
