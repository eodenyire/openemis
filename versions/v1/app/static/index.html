<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>openEMIS – Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #1a237e 0%, #0d47a1 50%, #01579b 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 420px;
      padding: 48px 40px 40px;
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #1a237e, #0d47a1);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 12px;
    }
    .logo h1 { font-size: 26px; font-weight: 700; color: #1a237e; }
    .logo p  { font-size: 13px; color: #666; margin-top: 4px; }

    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #333; margin-bottom: 6px; }

    input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }
    input:focus { border-color: #0d47a1; box-shadow: 0 0 0 3px rgba(13,71,161,.12); }

    .btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #1a237e, #0d47a1);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
      margin-top: 8px;
    }
    .btn:hover   { opacity: .92; }
    .btn:active  { transform: scale(.98); }
    .btn:disabled { opacity: .6; cursor: not-allowed; }

    .error {
      background: #fdecea;
      color: #c62828;
      border: 1px solid #ef9a9a;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .footer { text-align: center; margin-top: 24px; font-size: 12px; color: #999; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🎓</div>
      <h1>openEMIS</h1>
      <p>Educational Management Information System</p>
    </div>

    <div class="error" id="error"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input id="username" type="text" placeholder="Enter your username" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Enter your password" autocomplete="current-password" required />
      </div>
      <button class="btn" type="submit" id="loginBtn">Sign In</button>
    </form>

    <div class="footer">openEMIS v1.0 &nbsp;·&nbsp; <a href="/api/docs" style="color:#0d47a1">API Docs</a></div>
  </div>

  <script>
    const form    = document.getElementById('loginForm');
    const errBox  = document.getElementById('error');
    const btn     = document.getElementById('loginBtn');

    // If already logged in, go straight to dashboard
    if (localStorage.getItem('openemis_token')) {
      window.location.href = '/dashboard';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errBox.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Signing in…';

      const body = new URLSearchParams({
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value,
      });

      try {
        const res = await fetch('/api/v1/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body,
        });

        if (!res.ok) {
          const data = await res.json();
          throw new Error(data.detail || 'Login failed');
        }

        const { access_token } = await res.json();
        localStorage.setItem('openemis_token', access_token);
        window.location.href = '/dashboard';
      } catch (err) {
        errBox.textContent = err.message;
        errBox.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
